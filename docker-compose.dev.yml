services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bullseye
    command: sleep infinity
    volumes:
      - .:/workspaces/Archimedes
  postgres:
    image: postgres:16
    container_name: archimedes-postgres
    environment:
      POSTGRES_DB: archimedes_dev
      POSTGRES_USER: archimedes
      POSTGRES_PASSWORD: archimedes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
