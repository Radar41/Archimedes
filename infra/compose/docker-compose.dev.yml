services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bullseye
    command: sleep infinity
    volumes:
      - ../..:/workspaces/Archimedes
    healthcheck:
      test: ["CMD-SHELL", "test -d /workspaces/Archimedes"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  postgres:
    image: postgres:16
    container_name: archimedes-postgres
    environment:
      POSTGRES_DB: archimedes_dev
      POSTGRES_USER: archimedes
      POSTGRES_PASSWORD: archimedes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archimedes -d archimedes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  temporal:
    image: temporalio/server:latest
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: archimedes
      POSTGRES_PWD: archimedes_dev
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address 127.0.0.1:7233 >/dev/null 2>&1 || tctl --address 127.0.0.1:7233 cluster health >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8233:8233"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8233').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
  minio:
    image: minio/minio
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || wget -q -O - http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  langfuse:
    image: langfuse/langfuse:latest
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://archimedes:archimedes_dev@postgres:5432/archimedes_dev}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY}
      SALT: ${LANGFUSE_PUBLIC_KEY}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  minio_data:
